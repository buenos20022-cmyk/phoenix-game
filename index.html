<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Найди Феникса</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg1: #12091f;
      --bg2: #22103a;
      --card: rgba(27, 22, 48, 0.9);
      --stroke: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #c9c4de;
      --gold: #ffd54a;
      --orange: #ff8a00;
      --pink: #ff3d7f;
      --red1: #4b1320;
      --red2: #2a0d15;
      --blue1: #12384b;
      --blue2: #102738;
      --phoenix1: #5a2600;
      --phoenix2: #2b1200;
      --pickedFront1: #4f347c;
      --pickedFront2: #2f1d55;
      --pickedBonus1: #1b5f7f;
      --pickedBonus2: #123f57;
      --pickedMine1: #7a2032;
      --pickedMine2: #521321;
      --pickedPhoenix1: #7b3d00;
      --pickedPhoenix2: #4b2100;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #3b155f 0%, transparent 32%),
        radial-gradient(circle at top right, #4a1d35 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      padding: 16px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 22px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--gold), var(--orange), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 10px;
      text-align: center;
    }

    .stat b {
      display: block;
      font-size: 18px;
      margin-bottom: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .cell {
      position: relative;
      aspect-ratio: 1 / 1;
      border: none;
      background: none;
      padding: 0;
      cursor: pointer;
      perspective: 1000px;
      -webkit-tap-highlight-color: transparent;
    }

    .cell:disabled {
      cursor: default;
    }

    .inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.55s ease;
    }

    .cell.open .inner {
      transform: rotateY(180deg) scale(1.02);
    }

    .cell.explode .front,
    .cell.explode .back.mine {
      animation: bombShake 0.38s ease-in-out;
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      font-weight: 800;
    }

    .front {
      background: linear-gradient(180deg, #2d234e, #1e1738);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.06),
        0 10px 18px rgba(0,0,0,0.24);
      font-size: 28px;
    }

    .back {
      transform: rotateY(180deg);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 28px;
      overflow: hidden;
    }

    .back.mine {
      background: linear-gradient(180deg, var(--red1), var(--red2));
    }

    .back.bonus {
      background: linear-gradient(180deg, var(--blue1), var(--blue2));
      color: #ffffff;
    }

    .bonus-value {
      display: inline-block;
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
      color: #ffffff;
      text-shadow:
        0 2px 10px rgba(0, 0, 0, 0.45),
        0 0 18px rgba(255, 255, 255, 0.18);
      letter-spacing: 0.3px;
      font-variant-numeric: tabular-nums;
    }

    .back.phoenix {
      background:
        radial-gradient(circle at center, rgba(255,213,74,0.35), transparent 55%),
        linear-gradient(180deg, var(--phoenix1), var(--phoenix2));
      box-shadow: 0 0 24px rgba(255,170,0,0.45);
      animation: phoenixPulse 1s ease-in-out infinite;
    }

    .cell.revealed-picked .front {
      background: linear-gradient(180deg, var(--pickedFront1), var(--pickedFront2));
      border-color: rgba(255,255,255,0.16);
    }

    .cell.revealed-picked .back {
      box-shadow:
        inset 0 0 0 2px rgba(255, 213, 74, 0.34),
        0 0 0 1px rgba(255,255,255,0.06);
    }

    .cell.revealed-picked .back.bonus {
      background: linear-gradient(180deg, var(--pickedBonus1), var(--pickedBonus2));
    }

    .cell.revealed-picked .back.bonus .bonus-value {
      color: #ffd54a;
      text-shadow:
        0 2px 12px rgba(0, 0, 0, 0.5),
        0 0 20px rgba(255, 213, 74, 0.28);
    }

    .cell.revealed-picked .back.mine {
      background: linear-gradient(180deg, var(--pickedMine1), var(--pickedMine2));
    }

    .cell.revealed-picked .back.phoenix {
      background:
        radial-gradient(circle at center, rgba(255,213,74,0.45), transparent 55%),
        linear-gradient(180deg, var(--pickedPhoenix1), var(--pickedPhoenix2));
    }

    .blast {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      pointer-events: none;
      animation: blastPop 0.55s ease-out forwards;
      z-index: 5;
      filter: drop-shadow(0 0 16px rgba(255, 138, 0, 0.8));
    }

    .message {
      min-height: 52px;
      margin-top: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      color: white;
      cursor: pointer;
    }

    .btn.dark {
      background: rgba(255,255,255,0.08);
    }

    .btn.primary {
      background: linear-gradient(90deg, var(--orange), var(--pink));
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(8,5,18,0.75);
      padding: 20px;
      z-index: 30;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      width: min(420px, 100%);
      background: linear-gradient(180deg, #24153d, #1a102e);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 26px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    }

    .phoenix-big {
      font-size: 72px;
      filter: drop-shadow(0 0 22px rgba(255,183,3,0.65));
      animation: phoenixPop 0.9s ease forwards;
    }

    .reward {
      font-size: 34px;
      font-weight: 900;
      color: var(--gold);
      margin: 12px 0 4px;
    }

    .small {
      color: var(--muted);
      margin-bottom: 16px;
    }

    .error-box {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 77, 109, 0.14);
      border: 1px solid rgba(255, 77, 109, 0.28);
      color: #ffd7df;
      text-align: center;
      display: none;
    }

    .error-box.show {
      display: block;
    }

    .result-panel {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      display: none;
      text-align: center;
    }

    .result-panel.show {
      display: block;
    }

    .result-panel b {
      display: block;
      font-size: 22px;
      margin-bottom: 6px;
      color: var(--gold);
    }

    .hint {
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    @keyframes bombShake {
      0%, 100% { transform: translateX(0) scale(1); }
      20% { transform: translateX(-4px) scale(1.03); }
      40% { transform: translateX(4px) scale(1.05); }
      60% { transform: translateX(-3px) scale(1.04); }
      80% { transform: translateX(3px) scale(1.02); }
    }

    @keyframes blastPop {
      0% { transform: scale(0.25); opacity: 0; }
      40% { transform: scale(1.22); opacity: 1; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    @keyframes phoenixPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,170,0,0.35); }
      50% { box-shadow: 0 0 42px rgba(255,170,0,0.75); }
    }

    @keyframes phoenixPop {
      0% { transform: scale(0.2) rotate(-20deg); opacity: 0; }
      60% { transform: scale(1.18) rotate(8deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">🔥 Найди Феникса</div>
      <div class="subtitle">
        Сделай 5 попыток.<br>
        На поле спрятаны мины, бонусы и один феникс.
      </div>

      <div class="stats">
        <div class="stat"><b>8</b><span>Мин</span></div>
        <div class="stat"><b>16</b><span>Бонусов</span></div>
        <div class="stat"><b>1000</b><span>DOGS</span></div>
      </div>

      <div id="grid" class="grid"></div>

      <div id="message" class="message">Попытки: 0/5</div>
      <div id="errorBox" class="error-box"></div>

      <div id="resultPanel" class="result-panel">
        <b id="resultTitle">Игра завершена</b>
        <div id="resultText">Общий выигрыш: 0 DOGS</div>
        <div class="hint">
          Все поля открыты. Нажмите «Закрыть», чтобы вернуться в бота.
        </div>
      </div>

      <div class="controls">
        <button id="closeBtn" class="btn dark">Закрыть</button>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay">
    <div class="modal">
      <div class="phoenix-big">🐦‍🔥</div>
      <div class="reward">+1000 DOGS</div>
      <div style="font-size: 22px; font-weight: 900; margin-bottom: 8px;">
        ФЕНИКС НАЙДЕН!
      </div>
      <div class="small">Продолжаем игру</div>
      <button id="claimBtn" class="btn primary">Продолжить</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id") || "";
    const boardParam = params.get("board") || "";

    const gridEl = document.getElementById("grid");
    const msgEl = document.getElementById("message");
    const overlay = document.getElementById("overlay");
    const claimBtn = document.getElementById("claimBtn");
    const closeBtn = document.getElementById("closeBtn");
    const errorBox = document.getElementById("errorBox");
    const resultPanel = document.getElementById("resultPanel");
    const resultTitle = document.getElementById("resultTitle");
    const resultText = document.getElementById("resultText");

    let board = [];
    let finished = false;
    let validSession = Boolean(sessionId);
    let openedCount = 0;
    const totalAttempts = 5;
    let currentLocked = false;
    let totalReward = 0;

    function decodeBoard(encoded) {
      if (!encoded) return [];

      try {
        const normalized = encoded.replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized + "=".repeat((4 - normalized.length % 4) % 4);
        const jsonText = decodeURIComponent(escape(window.atob(padded)));
        const rawBoard = JSON.parse(jsonText);

        if (!Array.isArray(rawBoard) || rawBoard.length !== 25) {
          return [];
        }

        return rawBoard.map((item, index) => ({
          id: index,
          type: item.type,
          value: Number(item.value || 0),
          icon: item.type === "mine" ? "💣" : item.type === "phoenix" ? "🐦‍🔥" : "",
          open: false,
          explode: false,
          picked: false,
        }));
      } catch (error) {
        console.error("BOARD_DECODE_ERROR", error);
        return [];
      }
    }

    function showError(text) {
      errorBox.textContent = text;
      errorBox.classList.add("show");
    }

    function hideError() {
      errorBox.classList.remove("show");
      errorBox.textContent = "";
    }

    function updateHeader(extraText = "") {
      const base = `Попытки: ${openedCount}/${totalAttempts}`;
      msgEl.textContent = extraText ? `${base} • ${extraText}` : base;
    }

    function getBackContent(cell) {
      if (cell.type === "bonus") {
        return `<span class="bonus-value">+${cell.value}</span>`;
      }
      return cell.icon;
    }

    function render() {
      gridEl.innerHTML = "";

      board.forEach((cell, index) => {
        const btn = document.createElement("button");
        btn.className =
          "cell" +
          (cell.open ? " open" : "") +
          (cell.explode ? " explode" : "") +
          (cell.picked ? " revealed-picked" : "");

        btn.disabled = finished || cell.open || !validSession || currentLocked;

        btn.innerHTML = `
          <div class="inner">
            <div class="face front">✨</div>
            <div class="face back ${cell.type}">
              ${getBackContent(cell)}
            </div>
            ${cell.explode ? '<div class="blast">💥</div>' : ""}
          </div>
        `;

        btn.addEventListener("click", () => openCell(index));
        gridEl.appendChild(btn);
      });
    }

    function sendPick(cellIndex) {
      if (!sessionId) {
        showError("Ошибка: отсутствует session_id");
        currentLocked = false;
        render();
        return;
      }

      const payload = {
        game: "phoenix",
        session_id: sessionId,
        cell_index: cellIndex
      };

      tg.sendData(JSON.stringify(payload));
    }

    function revealAllCells() {
      board.forEach((cell) => {
        cell.open = true;
      });
      render();
    }

    function finishGame() {
      finished = true;
      currentLocked = false;
      revealAllCells();
      updateHeader(`итог: ${totalReward} DOGS`);
      resultTitle.textContent = "Игра завершена";
      resultText.textContent = `Общий выигрыш: ${totalReward} DOGS. Результат отправлен в бот.`;
      resultPanel.classList.add("show");
    }

    function applyCellEffects(cell) {
      if (cell.type === "mine") {
        cell.explode = true;
        updateHeader("мина 0 DOGS");
      } else if (cell.type === "phoenix") {
        totalReward += cell.value;
        updateHeader(`феникс +${cell.value} DOGS`);
      } else {
        totalReward += cell.value;
        updateHeader(`бонус +${cell.value} DOGS`);
      }
    }

    function finalizePick(index) {
      const cell = board[index];
      sendPick(index);

      if (openedCount >= totalAttempts) {
        finishGame();
        return;
      }

      if (cell.type === "phoenix") {
        overlay.classList.add("show");
        return;
      }

      currentLocked = false;
      render();
    }

    function openCell(index) {
      if (finished || currentLocked || !validSession) return;

      const cell = board[index];
      if (!cell || cell.open) return;

      hideError();
      currentLocked = true;

      cell.open = true;
      cell.picked = true;
      openedCount += 1;
      render();

      const afterRevealDelay = cell.type === "mine" ? 900 : 650;

      setTimeout(() => {
        applyCellEffects(cell);
        render();
        finalizePick(index);
      }, afterRevealDelay);
    }

    claimBtn.addEventListener("click", () => {
      overlay.classList.remove("show");

      if (openedCount >= totalAttempts) {
        finishGame();
        return;
      }

      currentLocked = false;
      render();
    });

    closeBtn.addEventListener("click", () => {
      tg.close();
    });

    board = decodeBoard(boardParam);

    if (!validSession || !board.length) {
      finished = true;
      msgEl.textContent = "⚠️ Игровая сессия не найдена";
      showError("Открой игру заново из бота.");
    } else {
      updateHeader();
    }

    render();
  </script>
</body>
</html>
