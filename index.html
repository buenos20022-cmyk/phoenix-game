<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Найди Феникса</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg1: #12091f;
      --bg2: #22103a;
      --card: rgba(27, 22, 48, 0.9);
      --stroke: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #c9c4de;
      --gold: #ffd54a;
      --orange: #ff8a00;
      --pink: #ff3d7f;
      --blue1: #12384b;
      --blue2: #102738;
      --pickedFront1: #4f347c;
      --pickedFront2: #2f1d55;
      --pickedBack1: #1b5f7f;
      --pickedBack2: #123f57;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #3b155f 0%, transparent 32%),
        radial-gradient(circle at top right, #4a1d35 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      padding: 16px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 22px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--gold), var(--orange), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 10px;
      text-align: center;
    }

    .stat b {
      display: block;
      font-size: 18px;
      margin-bottom: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .cell {
      position: relative;
      aspect-ratio: 1 / 1;
      border: none;
      background: none;
      padding: 0;
      cursor: pointer;
      perspective: 1000px;
      -webkit-tap-highlight-color: transparent;
      overflow: visible;
    }

    .cell:disabled {
      cursor: default;
    }

    .inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.55s ease;
    }

    .cell.open .inner {
      transform: rotateY(180deg) scale(1.02);
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      font-weight: 800;
    }

    .front {
      background: linear-gradient(180deg, #2d234e, #1e1738);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.06),
        0 10px 18px rgba(0,0,0,0.24);
      font-size: 28px;
    }

    .back {
      transform: rotateY(180deg);
      border: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, var(--blue1), var(--blue2));
      color: #ffffff;
      font-size: 18px;
      overflow: hidden;
    }

    .cell.revealed-picked .front {
      background: linear-gradient(180deg, var(--pickedFront1), var(--pickedFront2));
      border-color: rgba(255,255,255,0.16);
    }

    .cell.revealed-picked .back {
      background: linear-gradient(180deg, var(--pickedBack1), var(--pickedBack2));
      box-shadow:
        inset 0 0 0 2px rgba(255, 213, 74, 0.34),
        0 0 0 1px rgba(255,255,255,0.06);
    }

    .message {
      min-height: 52px;
      margin-top: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      color: white;
      cursor: pointer;
    }

    .btn.dark {
      background: rgba(255,255,255,0.08);
    }

    .error-box {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 77, 109, 0.14);
      border: 1px solid rgba(255, 77, 109, 0.28);
      color: #ffd7df;
      text-align: center;
      display: none;
    }

    .error-box.show {
      display: block;
    }

    .result-panel {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      display: none;
      text-align: center;
    }

    .result-panel.show {
      display: block;
    }

    .result-panel b {
      display: block;
      font-size: 22px;
      margin-bottom: 6px;
      color: var(--gold);
    }

    .hint {
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">🔥 Найди Феникса</div>
      <div class="subtitle">
        Сделай 5 попыток.<br>
        Результат каждой клетки и итог игры считаются только на сервере.
      </div>

      <div class="stats">
        <div class="stat"><b>5</b><span>Попыток</span></div>
        <div class="stat"><b>25</b><span>Клеток</span></div>
        <div class="stat"><b>BOT</b><span>Проверка</span></div>
      </div>

      <div id="grid" class="grid"></div>

      <div id="message" class="message">Попытки: 0/5</div>
      <div id="errorBox" class="error-box"></div>

      <div id="resultPanel" class="result-panel">
        <b id="resultTitle">Игра завершена</b>
        <div id="resultText">Результат отправлен в бот.</div>
        <div class="hint">
          Итог игры и начисление будут обработаны ботом. Нажмите «Закрыть», чтобы вернуться в чат.
        </div>
      </div>

      <div class="controls">
        <button id="closeBtn" class="btn dark">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id") || "";

    const gridEl = document.getElementById("grid");
    const msgEl = document.getElementById("message");
    const closeBtn = document.getElementById("closeBtn");
    const errorBox = document.getElementById("errorBox");
    const resultPanel = document.getElementById("resultPanel");
    const resultTitle = document.getElementById("resultTitle");
    const resultText = document.getElementById("resultText");

    const totalAttempts = 5;

    let board = Array.from({ length: 25 }, (_, index) => ({
      id: index,
      open: false,
      picked: false
    }));

    let finished = false;
    let validSession = Boolean(sessionId);
    let openedCount = 0;
    let currentLocked = false;

    function showError(text) {
      errorBox.textContent = text;
      errorBox.classList.add("show");
    }

    function hideError() {
      errorBox.classList.remove("show");
      errorBox.textContent = "";
    }

    function updateHeader(extraText = "") {
      const base = `Попытки: ${openedCount}/${totalAttempts}`;
      msgEl.textContent = extraText ? `${base} • ${extraText}` : base;
    }

    function getBackContent(cell) {
      if (!cell.open) return "";
      return `<span>✓</span>`;
    }

    function render() {
      gridEl.innerHTML = "";

      board.forEach((cell, index) => {
        const btn = document.createElement("button");
        btn.className =
          "cell" +
          (cell.open ? " open" : "") +
          (cell.picked ? " revealed-picked" : "");

        btn.disabled = finished || cell.open || !validSession || currentLocked;

        btn.innerHTML = `
          <div class="inner">
            <div class="face front">✨</div>
            <div class="face back">
              ${getBackContent(cell)}
            </div>
          </div>
        `;

        btn.addEventListener("click", () => openCell(index));
        gridEl.appendChild(btn);
      });
    }

    function sendPick(cellIndex) {
      if (!sessionId) {
        showError("Ошибка: отсутствует session_id");
        currentLocked = false;
        render();
        return false;
      }

      const payload = {
        game: "phoenix",
        session_id: sessionId,
        cell_index: cellIndex
      };

      tg.sendData(JSON.stringify(payload));
      return true;
    }

    function finishGame() {
      finished = true;
      currentLocked = false;

      updateHeader("игра завершена");
      resultTitle.textContent = "Игра завершена";
      resultText.textContent = "Все 5 ходов отправлены в бот. Итог и начисление считаются только на сервере.";

      if (sessionId) {
        tg.sendData(JSON.stringify({
          game: "phoenix",
          action: "finish",
          session_id: sessionId
        }));
      }

      resultPanel.classList.add("show");
      render();
    }

    function openCell(index) {
      if (finished || currentLocked || !validSession) return;

      const cell = board[index];
      if (!cell || cell.open) return;

      hideError();
      currentLocked = true;

      const sent = sendPick(index);
      if (!sent) {
        return;
      }

      cell.open = true;
      cell.picked = true;
      openedCount += 1;

      if (openedCount >= totalAttempts) {
        finishGame();
        return;
      }

      updateHeader("ход отправлен");
      currentLocked = false;
      render();
    }

    closeBtn.addEventListener("click", () => {
      tg.close();
    });

    if (!validSession) {
      finished = true;
      msgEl.textContent = "⚠️ Игровая сессия не найдена";
      showError("Открой игру заново из бота.");
    } else {
      updateHeader();
    }

    render();
  </script>
</body>
</html>
